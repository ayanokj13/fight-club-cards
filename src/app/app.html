<div class="min-h-screen bg-neutral-900 flex flex-col items-center py-12 font-sans select-none">
  
  <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 mb-12 uppercase tracking-widest text-center">
    Saloni Fight Club<br><span class="text-white text-xl tracking-normal">Digital Roster</span>
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 px-6 max-w-7xl">
    
    <div *ngFor="let card of cards" class="flex flex-col items-center">
      
      <div 
        class="perspective-1000 w-72 h-[26rem] touch-none group" 
        [class.cursor-grabbing]="activeCard === card"
        [class.cursor-grab]="activeCard !== card"
        (mousedown)="startDrag($event, card)"
        (touchstart)="startDrag($event, card)">
        
        <div 
          class="relative w-full h-full [transform-style:preserve-3d] transition-transform"
          [class.duration-0]="card.isDragging"
          [class.duration-500]="!card.isDragging"
          [class.ease-out]="!card.isDragging"
          [ngStyle]="{'transform': 'rotateX(' + card.rotationX + 'deg) rotateY(' + card.rotationY + 'deg)'}">
          
          <div class="absolute inset-0 w-full h-full [backface-visibility:hidden]">
            <img [src]="card.frontImage" [alt]="card.name" class="w-full h-full object-cover rounded-3xl shadow-2xl border-4 border-black pointer-events-none">
          </div>

          <div class="absolute inset-0 w-full h-full [backface-visibility:hidden] [transform:rotateY(180deg)]">
            <img [src]="card.backImage" alt="Card Back" class="w-full h-full object-cover rounded-3xl shadow-2xl border-4 border-black pointer-events-none">
          </div>
          
        </div>
      </div>

      <p class="mt-6 text-white text-2xl font-bold tracking-wide">{{ card.name }}</p>
      <p class="text-gray-400 text-sm mt-1 animate-pulse">Tap to flip, or Drag to rotate</p>

    </div>
  </div>
</div>
